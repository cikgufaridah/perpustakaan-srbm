<!DOCTYPE html>
<html lang="ms">
  
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perpustakaan SRBM</title>
  <link rel="icon" type="image/png" href="icon-512.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#5b21b6">
  <style>
    body{font-family:Arial,sans-serif;background:#f4e8ea;margin:0;padding:0;color:#222}
    header{background:#7a0019;;color:white;padding:18px;text-align:center}
    .container{max-width:900px;margin:auto;padding:15px}
    .card{background:white;border-radius:14px;padding:15px;margin:12px 0;box-shadow:0 2px 8px #ccc}
    input,select,button{width:100%;padding:12px;margin:6px 0;border-radius:10px;border:1px solid #ccc;font-size:16px}
    button{background:#7a0019;color:white;border:none;font-weight:bold}
    .btn2{background:#15803d}
    .btn3{background:#dc2626}
    table{width:100%;border-collapse:collapse;font-size:14px}
    th,td{border:1px solid #ddd;padding:8px;text-align:left}
    th{background:#ede9fe}
    h2{color:#4c1d95}
  </style>
  
</head>
<body>

<header>
  <h1>📚 Perpustakaan SR Batu Marang</h1>
  <p>Rekod Pinjaman dan Pemulangan Buku</p>
</header>

<div class="container">
  <section class="card">
  <h2>📥 Import Murid</h2>

  <input type="file" id="csvFile" accept=".csv">

  <button onclick="importMuridCSV()">Import Murid</button>

  <p id="importStatus"></p>
</section>

  <div class="card">
    <h2>📖 Pinjam Buku</h2>
   <input id="noAhli" placeholder="No. Ahli">

<button onclick="cariMurid()">🔍 Cari Murid</button>

<input id="nama" placeholder="Nama Murid" readonly>
    <select id="tahun">
      <option value="">Pilih tahun</option>
      <option>Tahun 1</option>
<option>Tahun 2</option>
<option>Tahun 3</option>
      <option>Tahun 4</option><option>Tahun 5</option><option>Tahun 6</option>
    </select>
    <input id="noAcc" placeholder="No. Acc Buku">
    <input id="tajuk" placeholder="Tajuk buku">
    <select id="kategori">
      <option>Cerita Melayu</option>
      <option>Cerita Inggeris</option>
      <option>Pengetahuan Am</option>
      <option>Agama</option>
      <option>Sains</option>
      <option>Lain-lain</option>
    </select>
    <button onclick="pinjamBuku()">Simpan Pinjaman</button>
  </div>

  <div class="card">
    <h2>📚 Buku Masih Dipinjam</h2>
    <div id="senaraiDipinjam">Memuatkan data...</div>
  </div>

  <div class="card">
    <h2>🔍 Cari Murid</h2>
    <input id="cariNama" placeholder="Taip nama murid" oninput="cariNama()"
    <div id="hasilCari"></div>
  </div>

  <div class="card">
    <h2>🏆 Ranking Peminjam Buku</h2>
    <div id="ranking">Memuatkan ranking...</div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getDatabase, ref, push, onValue, update, remove, set } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDuoVBHNFjV0EWGYzcPE8M_o_XXEzz8DmY",
  authDomain: "perpustakaan-srbm.firebaseapp.com",
  databaseURL: "https://perpustakaan-srbm-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "perpustakaan-srbm",
  storageBucket: "perpustakaan-srbm.firebasestorage.app",
  messagingSenderId: "945482111304",
  appId: "1:945482111304:web:94df339d7ef1b18b63fb7d"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
let semuaData = {};
window.cariMurid = function () {

  const noAhli = document.getElementById("noAhli").value.trim();

  if (!noAhli) {
    alert("Sila masukkan No. Ahli.");
    return;
  }

  const muridRef = ref(db, "murid/" + noAhli);

  onValue(muridRef, (snapshot) => {

    if (snapshot.exists()) {

      const murid = snapshot.val();

      document.getElementById("nama").value = murid.nama;
     document.getElementById("tahun").value = "Tahun " + murid.tahun;

    } else {

      alert("No. Ahli tidak dijumpai.");

      document.getElementById("nama").value = "";
      document.getElementById("tahun").value = "";

    }

  }, { onlyOnce: true });

};
window.pinjamBuku = function(){
  const nama = document.getElementById("nama").value.trim();
  const tahun = document.getElementById("tahun").value;
  const tajuk = document.getElementById("tajuk").value.trim();
  const noAcc = document.getElementById("noAcc").value.trim();
  const kategori = document.getElementById("kategori").value;

 if(!nama || !tahun || !noAcc || !tajuk){
    alert("Sila isi nama murid, tahun, No. Acc dan tajuk buku.");
    return;
}

  const jumlahSedangPinjam = Object.values(semuaData).filter(r =>
    r.nama.toLowerCase() === nama.toLowerCase() &&
    r.status === "Dipinjam"
  ).length;

  if(jumlahSedangPinjam >= 2){
    alert("Murid ini sudah meminjam 2 buah buku. Sila pulangkan buku dahulu.");
    return;
  }

  const tarikh = new Date().toLocaleDateString("ms-BN");

  push(ref(db, "pinjaman"), {
    nama: nama,
    tahun: tahun,
      noAcc: noAcc,
    tajuk: tajuk,
    kategori: kategori,
    tarikhPinjam: tarikh,
    tarikhPulang: "",
    status: "Dipinjam"
  });

  alert("Pinjaman berjaya disimpan.");

  document.getElementById("nama").value = "";
  document.getElementById("tajuk").value = "";
};
window.pulangkanBuku = function(id){
    if(confirm("Adakah buku ini sudah dipulangkan?")){
        update(ref(db, "pinjaman/" + id), {
            status: "Dipulangkan",
            tarikhPulang: new Date().toLocaleDateString("ms-BN")
        });
        alert("Buku berjaya dipulangkan.");
    }
};

function paparData(data){
  let kumpulan = {};
let kiraan = {};
Object.keys(data).forEach(id=>{
  const r = data[id];

  const namaKey = (r.nama || "").trim().toLowerCase();

  if(!namaKey){
    return;
  }

  const namaPaparan = namaKey.charAt(0).toUpperCase() + namaKey.slice(1);

  if(!kiraan[namaKey]){
    kiraan[namaKey] = {
      nama: namaPaparan,
      tahun: r.tahun,
      jumlah: 0
    };
  }

  kiraan[namaKey].jumlah++;

  if(r.status === "Dipinjam"){
    if(!kumpulan[namaKey]){
      kumpulan[namaKey] = {
        nama: namaPaparan,
        tahun: r.tahun,
        buku: []
      };
    }

    kumpulan[namaKey].buku.push({
      id: id,
      tajuk: r.tajuk,
      tarikhPinjam: r.tarikhPinjam
    });
  }
});

let dipinjam = "<table><tr><th>Nama</th><th>Tahun</th><th>Buku Dipinjam 2</th><th>Tindakan</th></tr>";

Object.keys(kumpulan).forEach(nama=>{
  const murid = kumpulan[nama];

  let bukuHTML = "";
  let tindakanHTML = "";

  murid.buku.forEach((b, index)=>{
    bukuHTML += `📚 ${index + 1}. ${b.tajuk}<br><small>${b.tarikhPinjam}</small><br>`;
    tindakanHTML += `<button class="btn2" onclick="pulangkanBuku('${b.id}')">Pulangkan Buku ${index + 1}</button><br>`;
  });

  dipinjam += `
    <tr>
     <td>${murid.nama}</td>
      <td>${murid.tahun}</td>
      <td>${bukuHTML}</td>
      <td>${tindakanHTML}</td>
    </tr>`;
});

dipinjam += "</table>";
  document.getElementById("senaraiDipinjam").innerHTML = dipinjam;

  const rank = Object.values(kiraan).sort((a,b)=>b.jumlah-a.jumlah);
  let html = "<table><tr><th>Kedudukan</th><th>Nama</th><th>Tahun</th><th>Jumlah</th></tr>";
  rank.forEach((r,i)=>{
    html += `<tr><td>${i+1}</td><td>${r.nama}</td><td>${r.tahun}</td><td>${r.jumlah}</td></tr>`;
  });
  html += "</table>";
  document.getElementById("ranking").innerHTML = html;
}

window.cariNama = function(){
  const q = document.getElementById("cariNama").value.toLowerCase();
  if(!q){
    document.getElementById("hasilCari").innerHTML = "";
    return;
  }

  let html = "<table><tr><th>Nama</th><th>Tahun</th><th>Buku</th><th>Status</th></tr>";
  Object.values(semuaData).forEach(r=>{
    if(r.nama.toLowerCase().includes(q)){
      html += `<tr>
        <td>${r.nama}</td>
        <td>${r.tahun}</td>
        <td>${r.tajuk}</td>
        <td>${r.status}</td>
      </tr>`;
    }
  });
  html += "</table>";
  document.getElementById("hasilCari").innerHTML = html;
};

onValue(ref(db, "pinjaman"), snapshot=>{
  semuaData = snapshot.val() || {};
  if(Object.keys(semuaData).length === 0){
    document.getElementById("senaraiDipinjam").innerHTML = "Belum ada rekod.";
    document.getElementById("ranking").innerHTML = "Belum ada ranking.";
  } else {
    paparData(semuaData);
  }
});
  window.importMuridCSV = function () {
  const fileInput = document.getElementById("csvFile");
  const status = document.getElementById("importStatus");

  if (!fileInput.files.length) {
    alert("Sila pilih fail CSV dahulu.");
    return;
  }

  const file = fileInput.files[0];
  const reader = new FileReader();

  reader.onload = async function (e) {
    const text = e.target.result;
    const rows = text.split(/\r?\n/).filter(row => row.trim() !== "");

    let jumlah = 0;

    for (let i = 1; i < rows.length; i++) {
      const cols = rows[i].split(",");

      const noAhli = (cols[0] || "").trim();
      const nama = (cols[1] || "").trim();
      const tahun = (cols[2] || "").trim();

      if (noAhli && nama && tahun) {
        await set(ref(db, "murid/" + noAhli), {
          noAhli: noAhli,
          nama: nama,
          tahun: tahun
        });

        jumlah++;
      }
    }

    status.innerHTML = "✅ " + jumlah + " orang murid berjaya diimport.";
    alert(jumlah + " orang murid berjaya diimport.");
  };

  reader.readAsText(file);
};
</script>
  <script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
